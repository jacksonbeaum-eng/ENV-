<html lang="en">

    *{margin:0;padding:0;box-sizing:border-box;}
    html,body,#root{width:100%;height:100%;}
    body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;transition:background 0.2s,color 0.2s;-webkit-font-smoothing:antialiased;}
    .wrap{max-width:100%;padding:1rem 1rem 2rem;position:relative;z-index:1;}
    .tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem;border-bottom:1px solid var(--border);padding-bottom:0.5rem;}
    .tab-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:0.5rem 1rem;font-weight:600;font-size:0.85rem;transition:color 0.2s,border-bottom 0.2s;border-bottom:2px solid transparent;}
    .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
    .hdr{margin-bottom:2rem;border-bottom:1px solid var(--border);padding-bottom:1.5rem;}
    .hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1rem;}
    h1{font-size:1.8rem;font-weight:700;letter-spacing:-0.02em;line-height:1.1;}
    h1 span{color:var(--accent);}
    .sub{color:var(--text3);font-size:0.7rem;font-family:var(--mono);margin-top:0.3rem;text-transform:uppercase;letter-spacing:0.08em;}
    .yr-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:0.5rem;margin-bottom:1rem;}
    .yr-stat{padding:0.8rem;background:var(--surface2);border:1px solid var(--border);border-radius:0.5rem;}
    .yr-lbl{font-size:0.55rem;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:0.3rem;}
    .yr-val{font-family:var(--mono);font-size:0.95rem;font-weight:700;color:var(--text);}
    .yr-val.g{color:var(--green);}
    .yr-val.b{color:var(--blue);}
    .yr-val.r{color:var(--red);}
    .cycles{display:flex;flex-direction:column;gap:0.4rem;}
    .card{border:1px solid var(--border);border-radius:0.5rem;overflow:hidden;background:var(--surface);}
    .card.open{border-color:var(--accent2);}
    .card-hdr{width:100%;padding:0.9rem;display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:none;cursor:pointer;transition:background 0.15s;gap:0.7rem;}
    .card-hdr:active{background:var(--surface2);}
    .card.open .card-hdr{background:var(--surface2);}
    .cleft{display:flex;align-items:center;gap:0.8rem;flex:1;min-width:0;}
    .num-badge{background:var(--surface3);border:1px solid var(--border2);border-radius:0.3rem;padding:0.25rem 0.45rem;font-family:var(--mono);font-size:0.6rem;color:var(--accent);font-weight:700;}
    .progress-bar{width:60px;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;border:1px solid var(--border2);}
    .progress-fill{height:100%;background:var(--green);transition:width 0.3s;}
    .progress-fill.warning{background:var(--yellow);}
    .progress-fill.danger{background:var(--red);}
    .cdate{font-family:var(--mono);font-size:0.7rem;color:var(--text2);}
    .cstats{display:flex;align-items:center;gap:1rem;font-size:0.65rem;}
    .st{display:flex;flex-direction:column;align-items:flex-end;}
    .st-lbl{font-size:0.5rem;font-weight:700;color:var(--text3);text-transform:uppercase;}
    .st-val{font-family:var(--mono);font-size:0.75rem;font-weight:700;color:var(--text);}
    .st-val.g{color:var(--green);}
    .st-val.d{color:var(--text3);}
    .chev{width:12px;height:12px;color:var(--text3);transition:transform 0.2s;flex-shrink:0;}
    .chev.rot{transform:rotate(180deg);}
    .card-body{background:var(--surface);border-top:1px solid var(--border);}
    .pane{padding:1rem;border-bottom:1px solid var(--border);}
    .pane:last-child{border-bottom:none;}
    .pane-ttl{font-size:0.55rem;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:0.8rem;}
    .summary-box{background:var(--surface3);border:1px solid var(--border2);border-radius:0.4rem;padding:0.8rem;margin-bottom:1rem;}
    .summary-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:0.6rem;}
    .summary-row:last-child{margin-bottom:0;}
    .summary-label{font-size:0.55rem;font-weight:700;color:var(--text3);text-transform:uppercase;}
    .summary-value{font-family:var(--mono);font-size:0.95rem;font-weight:700;color:var(--text);}
    .summary-value.acc{color:var(--accent);}
    .summary-value.g{color:var(--green);}
    .summary-value.r{color:var(--red);}
    .summary-value.b{color:var(--blue);}
    .income-input-group{display:flex;gap:0.4rem;margin-bottom:0.6rem;}
    .income-input-group input,.income-input-group select{background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:0.5rem;border-radius:0.3rem;font-family:var(--mono);font-size:0.75rem;}
    .income-input-group input::placeholder{color:var(--text3);}
    .income-btn{background:var(--accent);color:var(--bg);border:none;padding:0.5rem 0.8rem;border-radius:0.3rem;cursor:pointer;font-weight:700;font-size:0.7rem;transition:background 0.2s;}
    .income-btn:active{background:var(--accent2);}
    .income-list{display:flex;flex-direction:column;gap:0.4rem;}
    .income-item{display:flex;justify-content:space-between;align-items:center;padding:0.6rem;background:var(--surface2);border:1px solid var(--border2);border-radius:0.3rem;}
    .income-source{font-size:0.7rem;color:var(--text2);font-family:var(--mono);}
    .income-amount{font-weight:700;color:var(--green);font-family:var(--mono);}
    .income-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:0.8rem;padding:0.2rem 0.4rem;transition:color 0.2s;}
    .income-del:active{color:var(--red);}
    .bill-list{display:flex;flex-direction:column;gap:1px;}
    .bill-btn{display:flex;align-items:flex-start;gap:0.6rem;padding:0.7rem;border-radius:0.3rem;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;transition:background 0.15s;}
    .bill-btn:active{background:var(--surface3);}
    .bill-btn.paid{opacity:0.4;}
    .bill-actions{display:flex;gap:0.3rem;align-items:center;}
    .bill-del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:0.75rem;padding:0.2rem 0.3rem;transition:color 0.2s;flex-shrink:0;}
    .bill-del-btn:hover{color:var(--red);}
    .bill-note-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:0.75rem;padding:0.2rem 0.3rem;transition:color 0.2s;flex-shrink:0;}
    .bill-note-btn:hover{color:var(--accent);}
    .chkbox{width:18px;height:18px;flex-shrink:0;border-radius:2px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--green);margin-top:2px;}
    .bill-btn.paid .chkbox{background:var(--green);opacity:0.7;border-color:var(--green);}
    .binfo{flex:1;min-width:0;}
    .brow{display:flex;align-items:baseline;justify-content:space-between;gap:0.5rem;margin-bottom:0.2rem;}
    .bamt{font-size:0.8rem;font-weight:700;font-family:var(--mono);color:var(--text);}
    .bill-btn.paid .bamt{text-decoration:line-through;color:var(--text3);}
    .bdue{font-size:0.65rem;font-family:var(--mono);color:var(--text2);background:var(--surface3);padding:0.15rem 0.4rem;border-radius:2px;white-space:nowrap;}
    .bdesc{font-size:0.68rem;color:var(--text3);line-height:1.3;margin-bottom:0.15rem;}
    .bill-note{font-size:0.65rem;color:var(--text2);font-style:italic;margin-top:0.3rem;padding:0.3rem;background:var(--surface2);border-left:2px solid var(--accent);border-radius:2px;}
    .cpill{display:inline-block;font-size:0.5rem;font-weight:700;text-transform:uppercase;padding:0.08rem 0.3rem;border-radius:2px;margin-left:0.25rem;vertical-align:middle;}
    .c-debt{background:rgba(244,91,105,0.15);color:#f45b69;}
    .c-housing{background:rgba(251,191,36,0.15);color:#d4a017;}
    .c-groceries{background:rgba(34,197,94,0.15);color:#4ade80;}
    .c-transportation{background:rgba(59,130,246,0.15);color:#60a5fa;}
    .c-education{background:rgba(249,115,22,0.15);color:#fb923c;}
    .c-subscription{background:rgba(99,102,241,0.15);color:#818cf8;}
    .c-music{background:rgba(168,85,247,0.15);color:#c084fc;}
    .badge-weekly{display:inline-block;font-size:0.5rem;font-weight:700;text-transform:uppercase;padding:0.06rem 0.25rem;border-radius:2px;margin-left:0.2rem;background:rgba(99,102,241,0.15);color:#818cf8;}
    .badge-final{display:inline-block;font-size:0.5rem;font-weight:700;text-transform:uppercase;padding:0.06rem 0.25rem;border-radius:2px;margin-left:0.2rem;background:rgba(244,91,105,0.15);color:#f45b69;}
    .badge-paycheck{display:inline-block;font-size:0.5rem;font-weight:700;text-transform:uppercase;padding:0.06rem 0.25rem;border-radius:2px;margin-left:0.2rem;background:rgba(34,197,94,0.15);color:#4ade80;}
    .badge-side{display:inline-block;font-size:0.5rem;font-weight:700;text-transform:uppercase;padding:0.06rem 0.25rem;border-radius:2px;margin-left:0.2rem;background:rgba(124,109,250,0.15);color:#7c6dfa;}
    .category-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:0.6rem;margin-bottom:1rem;}
    .category-card{background:var(--surface2);border:1px solid var(--border2);border-radius:0.4rem;padding:0.6rem;text-align:center;}
    .category-icon{font-size:1.2rem;margin-bottom:0.3rem;}
    .category-name{font-size:0.6rem;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:0.2rem;}
    .category-amount{font-family:var(--mono);font-size:0.8rem;font-weight:700;color:var(--text);}
    .debt-tracker{background:var(--surface2);border:1px solid var(--border2);border-radius:0.4rem;padding:0.8rem;margin-bottom:1rem;}
    .debt-item{display:flex;justify-content:space-between;align-items:center;padding:0.5rem 0;border-bottom:1px solid var(--border);margin-bottom:0.5rem;}
    .debt-item:last-child{border-bottom:none;margin-bottom:0;}
    .debt-name{font-size:0.7rem;font-weight:600;color:var(--text);}
    .debt-status{display:flex;align-items:center;gap:0.3rem;}
    .debt-badge{font-size:0.5rem;font-weight:700;background:rgba(244,91,105,0.15);color:#f45b69;padding:0.08rem 0.25rem;border-radius:2px;text-transform:uppercase;}
    .debt-badge.paid{background:rgba(34,197,94,0.15);color:#22d3a0;}
    .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0.3rem;margin-bottom:1rem;}
    .calendar-day{aspect-ratio:1;background:var(--surface2);border:1px solid var(--border2);border-radius:0.3rem;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:0.6rem;padding:0.3rem;text-align:center;}
    .calendar-day.paycheck{background:rgba(34,197,94,0.15);border-color:rgba(34,197,94,0.3);}
    .calendar-day.bill{background:rgba(244,91,105,0.15);border-color:rgba(244,91,105,0.3);}
    .export-btn{background:var(--accent);color:var(--bg);border:none;padding:0.6rem 1rem;border-radius:0.3rem;cursor:pointer;font-weight:700;font-size:0.75rem;transition:background 0.2s;}
    .export-btn:active{background:var(--accent2);}
    .modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:0.5rem;padding:1.5rem;max-width:400px;width:90%;position:relative;}
    .modal-title{font-size:1rem;font-weight:700;margin-bottom:1rem;}
    .modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--text3);cursor:pointer;font-size:1.5rem;}
    .modal-input{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:0.6rem;border-radius:0.3rem;margin-bottom:0.8rem;font-family:var(--mono);font-size:0.75rem;}
    .modal-input::placeholder{color:var(--text3);}
    .modal-input:focus{outline:none;border-color:var(--accent);}
    .modal-buttons{display:flex;gap:0.5rem;}
    .modal-btn{flex:1;padding:0.6rem;border:none;border-radius:0.3rem;cursor:pointer;font-weight:700;font-size:0.75rem;}
    .modal-btn.primary{background:var(--accent);color:var(--bg);}
    .modal-btn.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border2);}
    .goal-progress{height:8px;background:var(--surface3);border-radius:4px;overflow:hidden;}
    .goal-progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));transition:width 0.3s;}
    .footer-note{margin-top:1.5rem;text-align:center;font-size:0.65rem;color:var(--text3);font-family:var(--mono);}
  </style>
</head>

function buildCycles(){
return CYCLE_DATA.map((data,idx)=>{
const bills=data.bills.map((b,bi)=>({
id:‘bill-’+idx+’-’+bi,
name:b.name,
amount:b.amount,
cat:b.cat,
weekly:b.weekly||false,
final:b.final||false,
due:b.due

function IncomeInput({onAdd}){
const [input,setInput]=useState(’’);
const [type,setType]=useState(‘paycheck’);
const handleAdd=()=>{
const match=input.match(/^([a-zA-Z\s&0-9]+?)\s*[-–]\s*$?([\d,]+(?:.\d{2})?)\s*$/);
if(!match)return;
const source=match[1].trim();
const amount=parseFloat(match[2].replace(/,/g,’’));
if(source&&amount>0){
onAdd(source,amount,type);
setInput(’’);
}
};
return(
<div className="income-input-group">
<input type=“text” placeholder=“Amazon Flex - 90” value={input} onChange={e=>setInput(e.target.value)} onKeyPress={e=>e.key===‘Enter’&&handleAdd()}/>
<select value={type} onChange={e=>setType(e.target.value)}>
<option value="paycheck">Paycheck</option>
<option value="side">Side Income</option>
</select>
<button className="income-btn" onClick={handleAdd}>Add</button>
</div>
);
}

function AddBillForm({onAdd}){
const [input,setInput]=useState(’’);
const handleAdd=()=>{
const match=input.match(/^([a-zA-Z\s&0-9:]+?)\s*[-–]\s*$?([\d,]+(?:.\d{2})?)\s*$/);
if(!match)return;
const name=match[1].trim();
const amount=parseFloat(match[2].replace(/,/g,’’));
if(name&&amount>0){
onAdd(name,amount);
setInput(’’);
}
};
return(
<div style={{marginTop:‘0.8rem’,paddingTop:‘0.8rem’,borderTop:‘1px solid var(–border)’}}>
<div style={{fontSize:‘0.55rem’,fontWeight:700,color:‘var(–text3)’,textTransform:‘uppercase’,marginBottom:‘0.6rem’}}>Add Custom Bill</div>
<div className="income-input-group">
<input type=“text” placeholder=“Bill name - 50” value={input} onChange={e=>setInput(e.target.value)} onKeyPress={e=>e.key===‘Enter’&&handleAdd()}/>
<button className="income-btn" onClick={handleAdd}>Add</button>
</div>
</div>
);
}

function NoteModal({show,noteText,onSave,onClose,onChange}){
return(
<div className={‘modal-overlay’+(show?’ open’:’’)}>
<div className="modal">
<button className="modal-close" onClick={onClose}>×</button>
<div className="modal-title">Bill Note</div>
<textarea className=“modal-input” style={{minHeight:‘100px’,fontFamily:‘var(–sans)’,resize:‘vertical’}} value={noteText} onChange={e=>onChange(e.target.value)} placeholder=“Add notes about this bill…”></textarea>
<div className="modal-buttons">
<button className="modal-btn secondary" onClick={onClose}>Cancel</button>
<button className=“modal-btn primary” onClick={()=>onSave(noteText)}>Save</button>
</div>
</div>
</div>
);
}

function GoalModal({show,amount,onSave,onClose,onChange}){
return(
<div className={‘modal-overlay’+(show?’ open’:’’)}>

<button className="modal-close" onClick={onClose}>×</button>

<div className="modal-buttons">
<button className="modal-btn secondary" onClick={onClose}>Cancel</button>
<button className=“modal-btn primary” onClick={()=>onSave(amount)}>Set Goal</button>
</div>
</div>
